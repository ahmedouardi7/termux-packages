                      - name: KSOC Guard
  # You may pin to the exact commit or the version.
  # uses: ksoclabs/guard-action@e61edd337d11df1ec4f8d5279f2f9937a7d1dadc
  uses: ksoclabs/guard-action@v0.0.10
  with:
